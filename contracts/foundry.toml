[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

# For testing with 1-minute intervals
[profile.default.fuzz]
runs = 256

# Remappings
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

# Local Anvil chain config
[rpc_endpoints]
anvil = "http://127.0.0.1:8545"

[etherscan]
unknown_chain = { key = "", chain = 31337, url = "http://localhost:8545" }
