# Fly.io configuration for Ancient Protocol
# See https://fly.io/docs/reference/configuration/ for documentation

app = 'ancient-protocol'
primary_region = 'sjc'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  ANVIL_URL = 'http://127.0.0.1:8545'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = "60s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/rpc/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# Larger VM for better Anvil performance (optional)
# [[vm]]
#   memory = '2gb'
#   cpu_kind = 'shared'
#   cpus = 2
